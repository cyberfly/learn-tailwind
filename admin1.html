<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>learntailwind</title>
  <link href="/src/style.css" rel="stylesheet">
</head>

<body>

  <div class="bg-yellow-400 py-4 px-4">
    Header
  </div>

  <!-- kotak 5 -->

  <div class="bg-yellow-500 flex min-h-screen">

    <!-- kotak 6 kiri -->
    <div class="bg-blue-500 w-96 py-4 px-4">
      <h4 class="text-2xl font-semibold">Sidebar</h4>
    </div>
    <!-- end kotak 6 kiri -->

    <!-- kotak 7 kanan -->
    <div class="bg-pink-400 flex-1 py-4 px-4">

      <h4 class="text-4xl font-bold">Content Area</h4>

      <div class="bg-pink-100 border border-pink-400 rounded-lg px-4 py-4 mt-10">
        Card 1
      </div>

      <div class="bg-pink-300 border border-pink-400 rounded-lg px-4 py-4 mt-4">
        Card 2
      </div>

      <div class="bg-pink-200 rounded-lg p-4 mt-4">
        <h3 class="text-3xl font-semibold mb-4">Buttons</h3>


        <button class="bg-blue-600 text-white rounded-lg py-2 px-4">Primary</button>
        <button class="bg-green-600 text-white rounded-lg py-2 px-4">Success</button>
        <button class="bg-red-600 text-white rounded-lg py-2 px-4">Danger</button>
        <button class="bg-yellow-600 text-white rounded-lg py-2 px-4">Warning</button>
        <button class="bg-gray-900 text-white rounded-lg py-2 px-4">Dark</button>
        
      </div>

      <div class="bg-pink-200 rounded-lg p-4 mt-4">
        <h3 class="text-3xl font-semibold mb-4">Alerts</h3>


        <div class="bg-green-400 text-green-100 rounded-md border border-green-600 p-4 mb-4">A simple success alert—check it out!</div>
        <div class="bg-orange-400 text-orange-100 rounded-md border border-orange-600 p-4 mb-4">A simple success alert—check it out!</div>
        <div class="bg-red-600 text-red-100 rounded-md border border-red-600 p-4 mb-4">A simple success alert—check it out!</div>
        
      </div>


    </div>
    <!-- end kotak 7 kanan -->

  </div>

  <!-- end kotak 5 -->

</body>

</html>
