<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>learntailwind</title>
  <link href="/src/style.css" rel="stylesheet">
</head>

<body>

  <div class="bg-blue-100 min-h-screen p-10">

    <h3 class="font-bold text-2xl mb-10">Sample Tailwind Forms</h3>

    <form class="flex flex-col gap-6">

      <div class="flex flex-col gap-4">
        <div class="flex flex-col gap-2">
          <label for="full_name" class="text-sm font-medium">Full Name</label>
          <input type="text" id="full_name" name="full_name" class="border border-gray-200 rounded-md shadow-md" />
        </div>

        <div class="flex flex-col gap-2">
          <label for="email" class="text-sm font-medium">Email</label>
          <input type="email" id="email" name="email" class="border border-gray-200 rounded-md shadow-md" />
        </div>

        <div class="flex flex-col gap-2">
          <label for="phone" class="text-sm font-medium">Phone Number</label>
          <input type="tel" id="phone" name="phone" />
        </div>

        <div class="flex gap-2">

          <div class="flex flex-col gap-2">
            <label for="dob" class="text-sm font-medium">Date of Birth</label>
            <input type="date" id="dob" name="dob" />
          </div>

          <div class="flex flex-col gap-2">
            <label for="gender" class="text-sm font-medium">Gender</label>
            <select id="gender" name="gender">
              <option value="">Select gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>

        </div>



        <div class="flex flex-col gap-2">
          <label for="occupation" class="text-sm font-medium">Occupation</label>
          <input type="text" id="occupation" name="occupation" />
        </div>

        <div class="flex flex-col gap-2">
          <label for="address" class="text-sm font-medium">Address</label>
          <input type="text" id="address" name="address" />
        </div>

        <div class="flex flex-col gap-2">
          <label for="city" class="text-sm font-medium">City</label>
          <input type="text" id="city" name="city" />
        </div>

        <div class="flex flex-col gap-2">
          <label for="state" class="text-sm font-medium">State</label>
          <input type="text" id="state" name="state" />
        </div>

        <div class="flex flex-col gap-2">
          <label for="zip" class="text-sm font-medium">Zip Code</label>
          <input type="text" id="zip" name="zip" />
        </div>
      </div>

      <div class="flex justify-end">
        <button type="submit">Submit</button>
      </div>

    </form>


  </div>



</body>

</html>
