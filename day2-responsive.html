<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>learntailwind</title>
  <link href="/src/style.css" rel="stylesheet">
</head>

<body>


  <div class="flex min-h-screen">
    <!-- left sidebar -->

    <!-- md below: bg-pink-100 -->
    <!-- md and above: bg-blue-400 -->
    <!-- hide sidebar on mobile -->

    <div class="hidden md:block md:w-72 lg:w-96 bg-pink-100 md:bg-blue-400 ">
      Left sidebar
    </div>
    <!-- end left sidebar -->

    <!-- content -->
    <div class="flex-1 bg-pink-200">

      <div class="mb-4">
        <!-- harmburger menu show only on mobile -->
        <button class="bg-blue-300 p-2 text-white md:hidden">Hamburger</button>
      </div>

      Content area

      <div class="bg-white rounded-md shadow-md p-4 mt-10">
        Responsive grid with Flexbox


        <div class="flex flex-wrap gap-8 ">

          <!-- grid 1 -->
          <div class="bg-blue-100 h-56 w-full md:w-1/2 lg:w-1/3 xl:w-1/4">
            Grid 1
          </div>
          <!-- end grid 1 -->

          <!-- grid 2 -->
          <div class="bg-pink-100 h-56 w-full md:w-1/2 lg:w-1/3 xl:w-1/4">
            Grid 2
          </div>
          <!-- end grid 2 -->

          <!-- grid 3 -->
          <div class="bg-yellow-100 h-56 w-full md:w-1/2 lg:w-1/3 xl:w-1/4">
            Grid 3
          </div>
          <!-- end grid 3 -->

          <!-- grid 4 -->
          <div class="bg-green-100 h-56 w-full md:w-1/2 lg:w-1/3 xl:w-1/4">
            Grid 4
          </div>
          <!-- end grid 4 -->


        </div>

        <!-- using CSS grid (not flex) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mt-10">
          <div class="bg-yellow-100">01</div>
          <div class="bg-red-100">02</div>
          <div class="bg-blue-100">03</div>
          <div class="bg-orange-100">04</div>
          <div class="bg-pink-100">05</div>
          <div class="bg-gray-100">06</div>
          <div class="bg-purple-100">07</div>
          <div class="bg-indigo-100">08</div>
          <div class="bg-slate-100">09</div>
        </div>
        <!-- end using CSS grid (not flex) -->

      </div>


    </div>
    <!-- end content -->
  </div>

</body>

</html>
