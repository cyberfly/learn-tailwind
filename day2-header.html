<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>learntailwind</title>
  <link href="/src/style.css" rel="stylesheet">
</head>

<body>


  <div class="bg-blue-100 min-h-screen">

    <header class="bg-white shadow-lg ">
      <div class="py-4 flex justify-between max-w-7xl mx-auto">

        <!-- kotak logo -->
        <div class="bg-blue-100">
          <a href="#">IniLogo</a>
        </div>
        <!-- end kotak logo -->

        <!-- kotak search -->
        <div class="bg-pink-100">
          Search
        </div>
        <!-- end kotak search -->

        <!-- kotak right navigation -->
        <div class="bg-green-100x space-x-4">

          <a href="#" class="hover:underline">Home</a>
          <a href="#" class="hover:underline">About</a>
          <a href="#" class="hover:underline">Contact</a>


          <!-- notification button -->

          <button class="bg-gray-200 p-2 rounded-full relative">
            <!-- bell icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
            </svg>
            <!-- end bell icon -->

            <!-- indicator -->
            <div class="bg-red-600 size-6 rounded-full absolute -top-2 -right-2 text-white flex items-center justify-center">7</div>
          </button>

        </div>
        <!-- end kotak right navigation -->

      </div>
    </header>


  </div>

</body>

</html>
