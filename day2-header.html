<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>learntailwind</title>
  <link href="/src/style.css" rel="stylesheet">
</head>

<body>


  <div class="bg-blue-100 min-h-screen">

    <header class="bg-white shadow-lg ">
      <div class="py-4 flex justify-between max-w-7xl mx-auto px-4">

        <!-- kotak logo -->
        <div class="bg-blue-100">
          <a href="#">IniLogo</a>
        </div>
        <!-- end kotak logo -->

        <!-- kotak search -->
        <div class="bg-pink-100">
          Search
        </div>
        <!-- end kotak search -->

        <!-- kotak right navigation -->
        <div class="bg-green-100x space-x-4 flex items-center">

          <a href="#" class="hover:underline">Home</a>
          <a href="#" class="hover:underline">About</a>
          <a href="#" class="hover:underline">Contact</a>

          <!-- messenger button -->

          <button class="bg-gray-200 p-2 rounded-full relative">
            <!-- messenger icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
            </svg>

            <!-- indicator -->
            <div
              class="bg-red-600 size-6 rounded-full absolute -top-2 -right-2 text-white flex items-center justify-center text-xs">
              4</div>

          </button>



          <!-- notification group  -->
          <div class="relative">

            <!-- notification button -->

            <button class="bg-gray-200 p-2 rounded-full relative">
              <!-- bell icon -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
              </svg>
              <!-- end bell icon -->

              <!-- indicator -->
              <div
                class="bg-red-600 size-6 rounded-full absolute -top-2 -right-2 text-white flex items-center justify-center text-xs">
                7</div>
            </button>

            <!-- notification panel -->
            <div class="bg-white shadow-md w-72 absolute -right-10 h-96 rounded-lg border border-gray-200 top-12">

              <!-- notification panel header -->
              <div class="px-4 py-2 border-b border-gray-200 font-semibold flex items-center justify-between">
                Notification

                <!-- triple dot button -->
                <button class="rounded-full hover:bg-gray-100 p-1">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                      d="M6.75 12a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM12.75 12a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM18.75 12a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                  </svg>
                </button>

              </div>
              <!-- end notification panel header -->

            </div>

          </div>
          <!-- end notification group  -->

          <!-- profile picture -->

          <button class="relative overflow-hidden">
            <img src="https://api.dicebear.com/9.x/lorelei/svg" class="size-10 rounded-full border border-gray-300"
              alt="">
          </button>

        </div>
        <!-- end kotak right navigation -->

      </div>
    </header>


  </div>

</body>

</html>
